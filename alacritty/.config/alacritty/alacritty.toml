
[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[terminal]
shell = { program = "tmux", args = ["new-session", "-A", "-s", "0"] }

[env]
TERM = "xterm-256color"

[window]
padding = { x = 17, y = 5 }

[font]
size = 15.0

[font.bold]
# family = "MesloLGS Nerd Font Mono"
family = "CaskaydiaCove Nerd Font"
style = "Bold"

[font.bold_italic]
family = "CaskaydiaCove Nerd Font"
# family = "MesloLGS Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "CaskaydiaCove Nerd Font"
# family = "MesloLGS Nerd Font Mono"
style = "Italic"

[font.normal]
# family = "MesloLGS Nerd Font Mono"
family = "CaskaydiaCove Nerd Font"
style = "Regular"

